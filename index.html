<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Banco de Horas Completo</title>
    <style>
        body{font-family:Arial;background:#eef2f5;margin:0}
        header{background:#239148;color:#fff;padding:15px;text-align:center}
        .tela{display:none;padding:15px;max-width:800px;margin:auto}
        .card{background:#fff;padding:15px;border-radius:10px;margin-top:15px}
        input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc}
        button{background:#239148;color:#fff;border:none;cursor:pointer}
        .excluir{background:red;color:white;padding:5px}
        table{width:100%;border-collapse:collapse;margin-top:15px}
        th,td{border:1px solid #ccc;padding:8px;text-align:center}
    </style>
</head>
<body>

<header>Sistema Banco de Horas</header>

<!-- LOGIN -->
<div id="login" class="tela" style="display:block">
    <div class="card">
        <h3>Login</h3>
        <input id="uUser" placeholder="Usuário">
        <input id="uPass" type="password" placeholder="Senha">
        <button id="btnEntrar">Entrar</button>
    </div>
</div>

<!-- MENU -->
<div id="menu" class="tela">
    <div class="card">
        <h3>Menu</h3>
        <button onclick="navegar('registro')">Registrar Horas</button>
        <button onclick="navegar('registros')">Ver Registros (Tabela)</button>
        <button onclick="navegar('relatorios')">Relatórios</button>
        <button onclick="navegar('ajuste')">Ajustar Saldo</button>
        <button onclick="navegar('usuarios')">Criar Usuário</button>
        <button onclick="location.reload()">Sair</button>
    </div>
</div>

<!-- REGISTRO -->
<div id="registro" class="tela card">
    <input id="rNome" placeholder="Nome Colaborador">
    <input type="date" id="rData">
    <input type="time" id="rEntrada">
    <input type="time" id="rSaida">
    <select id="rProjeto"></select>
    <select id="rTipo"><option value="banco">Banco</option><option value="compensar">Compensar</option></select>
    <button id="btnSalvar">Salvar Registro</button>
    <button onclick="navegar('menu')">Voltar</button>
</div>

<!-- LISTAGEM -->
<div id="registros" class="tela card">
    <input id="filtroNome" placeholder="Filtrar por nome..." oninput="renderizarLista()">
    <div>Saldo Total: <span id="saldoDisplay">0</span>h</div>
    <div id="tabelaContainer"></div>
    <button onclick="navegar('menu')">Voltar</button>
</div>

<!-- RELATORIOS E USUARIOS -->
<div id="relatorios" class="tela card">
    <button onclick="exportar(false)">Relatório Todos</button>
    <button onclick="exportar(true)">Relatório por Colaborador</button>
    <button onclick="navegar('menu')">Voltar</button>
</div>
<div id="ajuste" class="tela card">
    <input id="aNome" placeholder="Nome">
    <input id="aSaldo" type="number" placeholder="Horas (+/-)">
    <button id="btnAjustar">Aplicar Ajuste</button>
    <button onclick="navegar('menu')">Voltar</button>
</div>
<div id="usuarios" class="tela card">
    <input id="uCriarNome" placeholder="Usuário">
    <input id="uCriarSenha" placeholder="Senha">
    <input id="uCriarProjetos" placeholder="Projetos (separados por vírgula)">
    <button id="btnUser">Cadastrar</button>
    <button onclick="navegar('menu')">Voltar</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, onSnapshot, query, where } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const db = getFirestore(initializeApp({ /* SUAS CONFIGS AQUI */ }));
    
    // Variáveis Globais de estado
    window.listaDados = [];
    window.usuarioLogado = null;

    // Navegação Global
    window.navegar = (id) => {
        document.querySelectorAll('.tela').forEach(t => t.style.display = 'none');
        document.getElementById(id).style.display = 'block';
        if(id === 'registros') renderizarLista();
    };

    // Registrar Eventos
    document.getElementById('btnEntrar').onclick = async () => {
        const u = document.getElementById('uUser').value;
        const s = document.getElementById('uPass').value;
        // Simulação de autenticação
        window.usuarioLogado = { nome: u, projetos: ["Aliança", "Assu"] }; 
        navegar('menu');
    };

    document.getElementById('btnSalvar').onclick = async () => {
        await addDoc(collection(db, "registros"), {
            nome: document.getElementById('rNome').value,
            data: document.getElementById('rData').value,
            horas: 8, // Lógica simplificada
            projeto: document.getElementById('rProjeto').value,
            tipo: document.getElementById('rTipo').value
        });
        alert("Salvo!");
    };

    // Tabela e Filtro
    window.renderizarLista = () => {
        const filtro = document.getElementById('filtroNome').value.toLowerCase();
        const container = document.getElementById('tabelaContainer');
        let html = `<table><tr><th>Nome</th><th>Data</th><th>Tipo</th><th>Ação</th></tr>`;
        
        let saldo = 0;
        // Filtra por projetos permitidos ao usuário
        const filtrados = window.listaDados.filter(r => 
            window.usuarioLogado.projetos.includes(r.projeto) && 
            r.nome.toLowerCase().includes(filtro)
        );

        filtrados.forEach(r => {
            html += `<tr><td>${r.nome}</td><td>${r.data}</td><td>${r.tipo}</td>
                     <td><button class="excluir" onclick="del('${r.id}')">X</button></td></tr>`;
            saldo += (r.tipo === 'banco' ? r.horas : -r.horas);
        });
        
        container.innerHTML = html + `</table>`;
        document.getElementById('saldoDisplay').innerText = saldo;
    };

    window.del = async (id) => {
        await deleteDoc(doc(db, "registros", id));
    };

    // Carregar dados iniciais
    onSnapshot(collection(db, "registros"), (snap) => {
        window.listaDados = snap.docs.map(d => ({id: d.id, ...d.data()}));
    });

</script>
</body>
</html>
