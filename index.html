<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ponto de Deslocamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --verde:#239148; }

body{
  font-family:"Segoe UI",Arial;
  background:#eef2f5;
  margin:0;
}

header{
  background:var(--verde);
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.tela{
  display:none;
  padding:15px;
  max-width:500px;
  margin:auto;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:var(--verde);
  color:#fff;
  border:none;
  font-size:15px;
}

.menu button{ margin-bottom:10px; }

.item{
  background:#f7f7f7;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}

.excluir{
  background:#c0392b;
  margin-top:8px;
}
</style>
</head>

<body>

<header>Ponto de Deslocamento</header>

<!-- LOGIN -->
<div id="login" class="tela card">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Usuário">
  <input id="loginPass" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<!-- MENU -->
<div id="menu" class="tela card menu"></div>

<!-- REGISTRO -->
<div id="registro" class="tela card">
  <h3>Registrar Deslocamento</h3>
  <input id="rNome" placeholder="Colaborador">
  <input type="date" id="rData">
  <input type="time" id="rEntrada">
  <input type="time" id="rSaida">
  <input id="rMotivo" placeholder="Motivo">
  <select id="rProjeto"></select>
  <select id="rTipo">
    <option value="banco">Banco de horas</option>
    <option value="compensar">Compensação</option>
  </select>
  <button onclick="registrar()">Salvar</button>
  <button onclick="voltarMenu()">Voltar</button>
</div>

<!-- REGISTROS -->
<div id="registros" class="tela card">
  <h3>Registros</h3>

  <input id="filtroNome" placeholder="Filtrar colaborador" oninput="listar()">

  <div class="item">
    <b>Saldo do colaborador:</b>
    <span id="saldoColaborador">0</span> horas
  </div>

  <div id="listaRegistros"></div>

  <button onclick="voltarMenu()">Voltar</button>
</div>

<!-- RELATÓRIOS -->
<div id="relatorios" class="tela card">
  <h3>Relatórios</h3>
  <button onclick="exportarDetalhado()">Excel Detalhado</button>
  <button onclick="exportarSaldo()">Excel Saldo</button>
  <button onclick="voltarMenu()">Voltar</button>
</div>

<!-- AJUSTE -->
<div id="ajuste" class="tela card">
  <h3>Ajuste de Saldo</h3>
  <input id="aNome" placeholder="Colaborador">
  <select id="aProjeto"></select>
  <input type="number" id="aHoras" placeholder="Horas (+ ou -)">
  <button onclick="ajustarSaldo()">Aplicar</button>
  <button onclick="voltarMenu()">Voltar</button>
</div>

<!-- USUÁRIOS -->
<div id="usuarios" class="tela card">
  <h3>Usuários</h3>
  <input id="uNome" placeholder="Usuário">
  <input id="uSenha" placeholder="Senha">
  <select id="uPerfil">
    <option value="gestor">Gestor</option>
    <option value="rh">RH</option>
  </select>
  <button onclick="cadastrarUsuario()">Cadastrar</button>
  <button onclick="voltarMenu()">Voltar</button>
</div>

<script>
// DADOS
let projetos=["Aliança","Assu","AVT","Delta","Engie","Pampa"];
let registros=JSON.parse(localStorage.getItem("registros"))||[];
let usuarios=JSON.parse(localStorage.getItem("usuarios"))||{
  rh:{senha:"cymirh2026",perfil:"rh"}
};
let usuarioLogado=null;

// POPULA PROJETOS
["rProjeto","aProjeto"].forEach(id=>{
  let s=document.getElementById(id);
  projetos.forEach(p=>{
    let o=document.createElement("option");
    o.text=p; s.add(o);
  });
});

// TELAS
function mostrar(id){
  document.querySelectorAll(".tela").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}
mostrar("login");

// LOGIN
function entrar(){
  if(usuarios[loginUser.value] &&
     usuarios[loginUser.value].senha===loginPass.value){
    usuarioLogado=usuarios[loginUser.value];
    montarMenu();
    mostrar("menu");
  } else alert("Login inválido");
}

// MENU
function montarMenu(){
  let m=document.getElementById("menu");
  m.innerHTML="<h3>Menu</h3>";
  m.innerHTML+=`<button onclick="mostrar('registro')">Registrar</button>`;
  m.innerHTML+=`<button onclick="mostrar('registros'); listar();">Registros</button>`;
  m.innerHTML+=`<button onclick="mostrar('relatorios')">Relatórios</button>`;
  if(usuarioLogado.perfil==="rh"){
    m.innerHTML+=`<button onclick="mostrar('ajuste')">Ajustar Saldo</button>`;
    m.innerHTML+=`<button onclick="mostrar('usuarios')">Usuários</button>`;
  }
  m.innerHTML+=`<button onclick="location.reload()">Sair</button>`;
}

// REGISTRAR
function registrar(){
  let h=(new Date("1970-1-1 "+rSaida.value) -
         new Date("1970-1-1 "+rEntrada.value))/3600000;
  if(h<0)h+=24;

  registros.push({
    nome:rNome.value,
    data:rData.value,
    entrada:rEntrada.value,
    saida:rSaida.value,
    horas:h,
    projeto:rProjeto.value,
    tipo:rTipo.value,
    motivo:rMotivo.value
  });

  localStorage.setItem("registros",JSON.stringify(registros));
  alert("Registrado");
}

// LISTAR + SALDO + LIXEIRA
function listar(){
  listaRegistros.innerHTML="";
  let filtro=filtroNome.value.toLowerCase();
  let saldo=0;

  registros.forEach((r,i)=>{
    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    if(r.tipo==="banco") saldo+=r.horas;
    if(r.tipo==="compensar") saldo-=r.horas;

    listaRegistros.innerHTML+=`
      <div class="item">
        <b>${r.nome}</b><br>
        ${r.data} ${r.entrada}-${r.saida} (${r.horas}h)<br>
        ${r.projeto}<br>
        <small>${r.motivo}</small>
        <button class="excluir" onclick="excluirRegistro(${i})">🗑️ Excluir</button>
      </div>`;
  });

  saldoColaborador.innerText=saldo.toFixed(2);
}

function excluirRegistro(i){
  if(confirm("Excluir este registro?")){
    registros.splice(i,1);
    localStorage.setItem("registros",JSON.stringify(registros));
    listar();
  }
}

// AJUSTE
function ajustarSaldo(){ alert("Ajuste aplicado"); }

// USUÁRIOS
function cadastrarUsuario(){
  usuarios[uNome.value]={senha:uSenha.value,perfil:uPerfil.value};
  localStorage.setItem("usuarios",JSON.stringify(usuarios));
  alert("Usuário cadastrado");
}

// EXPORTA
function exportarDetalhado(){ alert("Modelo de exportação"); }
function exportarSaldo(){ alert("Modelo de exportação"); }

function voltarMenu(){ mostrar("menu"); }
</script>

</body>
</html>
