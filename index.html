<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Banco de Horas</title>

<style>
body{font-family:Arial;background:#eef2f5;margin:0}
header{background:#239148;color:#fff;padding:15px;text-align:center}

.tela{display:none;padding:15px;max-width:500px;margin:auto}
.card{background:#fff;padding:15px;border-radius:10px;margin-top:15px}

input,select,button{
width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc
}

button{background:#239148;color:#fff;border:none}
.excluir{background:red}

.item{background:#f2f2f2;padding:10px;margin-top:10px;border-radius:8px}

.msg{
position:fixed;
bottom:20px;
left:50%;
transform:translateX(-50%);
background:#000;
color:#fff;
padding:10px 20px;
border-radius:8px;
display:none;
}
</style>

<div id="msg" class="msg"></div>

<script>
let db, fb, usuarioLogado=null;
let projetos=["Aliança","Assu","AVT","Delta","Engie","Pampa"];

document.addEventListener("DOMContentLoaded", async ()=>{

const f1 = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
const f2 = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

const app = f1.initializeApp({
 apiKey:"AIzaSyAMgb-lp7EVOSbCzi9z1V_R4-QJE7p5ZI8",
 authDomain:"banco-de-horas-aff08.firebaseapp.com",
 projectId:"banco-de-horas-aff08"
});

db = f2.getFirestore(app);
fb = f2;

mostrar("login");

// projetos
["rProjeto","aProjeto"].forEach(id=>{
 let s=document.getElementById(id);
 if(s){
  projetos.forEach(p=>{
   let o=document.createElement("option");
   o.text=p;
   s.add(o);
  });
 }
});

// botões
btnEntrar.onclick=entrar;
btnSalvar.onclick=registrar;

});

/* ✅ MENSAGEM PROFISSIONAL */
function msg(t,tipo="ok"){
 let m=document.getElementById("msg");

 m.innerText=t;
 m.style.display="block";

 if(tipo=="ok") m.style.background="#239148";
 if(tipo=="erro") m.style.background="#c0392b";
 if(tipo=="load") m.style.background="#000";

 setTimeout(()=>m.style.display="none",2000);
}

/* TELAS */
function mostrar(id){
document.querySelectorAll(".tela").forEach(t=>t.style.display="none");
document.getElementById(id).style.display="block";
}

/* ✅ LOGIN */
async function entrar(){

let u=loginUser.value.trim().toLowerCase();
let p=loginPass.value.trim();

if(u==="rh" && p==="cymirh2026"){
 usuarioLogado={perfil:"rh"};
 montarMenu();
 mostrar("menu");
 return;
}

msg("Login inválido","erro");
}

/* MENU */
function montarMenu(){

menu.innerHTML="<h3>Menu</h3>";

menu.innerHTML+=`<button onclick="mostrar('registro')">Registrar</button>`;
menu.innerHTML+=`<button onclick="abrirRegistros()">Registros</button>`;
menu.innerHTML+=`<button onclick="mostrar('relatorios')">Relatórios</button>`;
menu.innerHTML+=`<button onclick="mostrar('ajuste')">Ajuste</button>`;
menu.innerHTML+=`<button onclick="mostrar('usuarios')">Usuários</button>`;
menu.innerHTML+=`<button onclick="location.reload()">Sair</button>`;
}

/* ✅ REGISTRAR (AGORA PERFEITO) */
async function registrar(){

if(!rNome.value){
 msg("Informe o nome","erro");
 return;
}

msg("Salvando... ⏳","load");

let h=(new Date("1970 "+rSaida.value)-
       new Date("1970 "+rEntrada.value))/3600000;

if(h<0)h+=24;

try{

 await fb.addDoc(fb.collection(db,"registros"),{
  nome:rNome.value,
  data:rData.value,
  entrada:rEntrada.value,
  saida:rSaida.value,
  horas:h,
  projeto:rProjeto.value,
  tipo:rTipo.value,
  motivo:rMotivo.value
 });

 msg("✅ Registro salvo");

 listar();

}catch(e){
 msg("❌ Erro ao salvar","erro");
}

}

/* ABRIR REGISTROS */
function abrirRegistros(){
mostrar("registros");
listar();
}

/* ✅ LISTAR */
async function listar(){

listaRegistros.innerHTML="";
let saldo=0;

let snap=await fb.getDocs(fb.collection(db,"registros"));

snap.forEach(d=>{
 let r=d.data();

 if(r.tipo==="banco") saldo+=r.horas;
 if(r.tipo==="compensar") saldo-=r.horas;

 listaRegistros.innerHTML+=`
 <div class="item">
   <b>${r.nome}</b><br>
   ${r.data} ${r.entrada}-${r.saida}<br>
   ${r.horas.toFixed(2)}h
   <button class="excluir" onclick="excluir('${d.id}')">Excluir</button>
 </div>`;
});

saldoColaborador.innerText=saldo.toFixed(2);
}

/* ✅ EXCLUIR */
async function excluir(id){

msg("Excluindo... ⏳","load");

try{
 await fb.deleteDoc(fb.doc(db,"registros",id));
 msg("✅ Excluído");
 listar();
}catch{
 msg("❌ Erro ao excluir","erro");
}

}

/* ✅ AJUSTE */
async function ajustarSaldo(){

msg("Aplicando ajuste...","load");

let horas=parseFloat(aHoras.value);
let tipo=horas>=0?"banco":"compensar";

await fb.addDoc(fb.collection(db,"registros"),{
 nome:aNome.value,
 data:new Date().toISOString().split("T")[0],
 entrada:"00:00",
 saida:"00:00",
 horas:Math.abs(horas),
 tipo:tipo
});

msg("✅ Ajuste aplicado");
}

/* ✅ USUÁRIOS */
async function cadastrarUsuario(){

await fb.addDoc(fb.collection(db,"usuarios"),{
 usuario:uNome.value,
 senha:uSenha.value,
 perfil:uPerfil.value
});

msg("✅ Usuário cadastrado");
}

/* ✅ RELATÓRIOS */
async function exportarDetalhado(){

let f=prompt("Colaborador (ou vazio = todos)")?.toLowerCase();

let csv="Nome;Data;Horas\n";
let snap=await fb.getDocs(fb.collection(db,"registros"));

snap.forEach(d=>{
 let r=d.data();
 if(f && !r.nome.toLowerCase().includes(f)) return;
 csv+=`${r.nome};${r.data};${r.horas}\n`;
});

downloadCSV(csv,"detalhado.csv");
}

async function exportarSaldo(){

let f=prompt("Colaborador (ou vazio = todos)")?.toLowerCase();

let saldo={};
let snap=await fb.getDocs(fb.collection(db,"registros"));

snap.forEach(d=>{
 let r=d.data();
 if(f && !r.nome.toLowerCase().includes(f)) return;

 if(!saldo[r.nome]) saldo[r.nome]=0;

 if(r.tipo==="banco") saldo[r.nome]+=r.horas;
 if(r.tipo==="compensar") saldo[r.nome]-=r.horas;
});

let csv="Nome;Saldo\n";

for(let n in saldo){
 csv+=`${n};${saldo[n].toFixed(2)}\n`;
}

downloadCSV(csv,"saldo.csv");
}

/* DOWNLOAD */
function downloadCSV(csv,n){
let b=new Blob(["\ufeff"+csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(b);
a.download=n;
a.click();
}
</script>
</head>

<body>

<header>Banco de Horas</header>

<div id="login" class="tela card">
<input id="loginUser">
<input id="loginPass" type="password">
<button id="btnEntrar">Entrar</button>
</div>

<div id="menu" class="tela card"></div>

<div id="registro" class="tela card">
<input id="rNome" placeholder="Colaborador">
<input type="date" id="rData">
<input type="time" id="rEntrada">
<input type="time" id="rSaida">
<input id="rMotivo">
<select id="rProjeto"></select>
<select id="rTipo">
<option value="banco">Banco</option>
<option value="compensar">Compensar</option>
</select>
<button id="btnSalvar">Salvar</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="registros" class="tela card">
<div>Saldo: <span id="saldoColaborador">0</span></div>
<div id="listaRegistros"></div>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="relatorios" class="tela card">
<button onclick="exportarDetalhado()">Detalhado</button>
<button onclick="exportarSaldo()">Saldo</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="ajuste" class="tela card">
<input id="aNome">
<input id="aHoras" type="number">
<button onclick="ajustarSaldo()">Aplicar</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="usuarios" class="tela card">
<input id="uNome">
<input id="uSenha">
<select id="uPerfil">
<option value="gestor">Gestor</option>
<option value="rh">RH</option>
</select>
<button onclick="cadastrarUsuario()">Cadastrar</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

</body>
</html>
