<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ponto de Deslocamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --verde:#239148; }

body{
  font-family:"Segoe UI",Arial;
  background:#eef2f5;
  margin:0;
}

header{
  background:var(--verde);
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.tela{
  display:none;
  padding:15px;
  max-width:500px;
  margin:auto;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:var(--verde);
  color:#fff;
  border:none;
  font-size:15px;
}

.menu button{ margin-bottom:10px; }

.item{
  background:#f7f7f7;
  padding:10px;
  border-radius:8px;
  margin-top:10px;
}
</style>

<!-- FIREBASE -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* 🔴 COLE AQUI SEUS DADOS DO FIREBASE */
const firebaseConfig = {
  apiKey: "COLE_AQUI",
  authDomain: "COLE_AQUI",
  projectId: "COLE_AQUI",
  storageBucket: "COLE_AQUI",
  messagingSenderId: "COLE_AQUI",
  appId: "COLE_AQUI"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

/* ------ SISTEMA ------ */

let projetos=["Aliança","Assu","AVT","Delta","Engie","Pampa"];
let usuarioLogado=null;

window.onload = ()=> {
  preencherProjetos();
};

/* TELAS */
window.mostrar = function(id){
  document.querySelectorAll(".tela").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}
mostrar("login");

/* LOGIN SIMPLES */
window.entrar = function(){
  if(loginUser.value==="rh" && loginPass.value==="cymirh2026"){
    usuarioLogado={perfil:"rh"};
    montarMenu();
    mostrar("menu");
  } else {
    usuarioLogado={perfil:"gestor"};
    montarMenu();
    mostrar("menu");
  }
}

/* MENU */
window.montarMenu = function(){
  let m=document.getElementById("menu");
  m.innerHTML="<h3>Menu</h3>";
  m.innerHTML+=`<button onclick="mostrar('registro')">Registrar</button>`;
  m.innerHTML+=`<button onclick="mostrar('registros'); listar();">Registros</button>`;
  m.innerHTML+=`<button onclick="mostrar('relatorios')">Relatórios</button>`;
}

/* PROJETOS */
function preencherProjetos(){
  ["rProjeto"].forEach(id=>{
    let s=document.getElementById(id);
    projetos.forEach(p=>{
      let o=document.createElement("option");
      o.text=p;
      s.add(o);
    });
  });
}

/* REGISTRAR ONLINE */
window.registrar = async function(){
  let h=(new Date("1970-1-1 "+rSaida.value) -
         new Date("1970-1-1 "+rEntrada.value))/3600000;
  if(h<0)h+=24;

  await addDoc(collection(db, "registros"), {
    nome:rNome.value,
    data:rData.value,
    entrada:rEntrada.value,
    saida:rSaida.value,
    horas:h,
    projeto:rProjeto.value,
    tipo:rTipo.value,
    motivo:rMotivo.value
  });

  alert("Salvo online ✅");
}

/* LISTAR ONLINE */
window.listar = async function(){
  listaRegistros.innerHTML="";
  let filtro=filtroNome.value.toLowerCase();
  let saldo=0;

  const snapshot = await getDocs(collection(db,"registros"));

  snapshot.forEach(doc=>{
    let r=doc.data();

    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    if(r.tipo==="banco") saldo+=r.horas;
    if(r.tipo==="compensar") saldo-=r.horas;

    listaRegistros.innerHTML+=`
      <div class="item">
        <b>${r.nome}</b><br>
        ${r.data} ${r.entrada}-${r.saida} (${r.horas.toFixed(2)}h)<br>
        ${r.projeto}
      </div>`;
  });

  saldoColaborador.innerText=saldo.toFixed(2);
}

/* RELATÓRIOS */
window.exportarDetalhado = async function(){
  let filtro = prompt("Filtrar colaborador (vazio = todos)")?.toLowerCase();

  const snapshot = await getDocs(collection(db,"registros"));

  let csv="Colaborador;Data;Entrada;Saida;Horas;Projeto;Tipo;Motivo\n";

  snapshot.forEach(doc=>{
    let r=doc.data();

    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    csv+=`${r.nome};${r.data};${r.entrada};${r.saida};${r.horas.toFixed(2)};${r.projeto};${r.tipo};${r.motivo}\n`;
  });

  downloadCSV(csv,"detalhado.csv");
}

window.exportarSaldo = async function(){
  let filtro = prompt("Filtrar colaborador (vazio = todos)")?.toLowerCase();

  const snapshot = await getDocs(collection(db,"registros"));

  let saldo={};

  snapshot.forEach(doc=>{
    let r=doc.data();

    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    if(!saldo[r.nome]) saldo[r.nome]=0;

    if(r.tipo==="banco") saldo[r.nome]+=r.horas;
    if(r.tipo==="compensar") saldo[r.nome]-=r.horas;
  });

  let csv="Colaborador;Saldo\n";

  for(let n in saldo){
    csv+=`${n};${saldo[n].toFixed(2)}\n`;
  }

  downloadCSV(csv,"saldo.csv");
}

/* DOWNLOAD */
function downloadCSV(csv,nome){
  let blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
  let link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=nome;
  link.click();
}

/* VOLTAR */
window.voltarMenu = ()=>mostrar("menu");

</script>

</head>

<body>

<header>Ponto de Deslocamento</header>

<div id="login" class="tela card">
  <h3>Login</h3>
  <input id="loginUser" placeholder="Usuário">
  <input id="loginPass" type="password" placeholder="Senha">
  <button onclick="entrar()">Entrar</button>
</div>

<div id="menu" class="tela card menu"></div>

<div id="registro" class="tela card">
  <h3>Registrar</h3>
  <input id="rNome" placeholder="Colaborador">
  <input type="date" id="rData">
  <input type="time" id="rEntrada">
  <input type="time" id="rSaida">
  <input id="rMotivo" placeholder="Motivo">
  <select id="rProjeto"></select>
  <select id="rTipo">
    <option value="banco">Banco</option>
    <option value="compensar">Compensar</option>
  </select>
  <button onclick="registrar()">Salvar</button>
  <button onclick="voltarMenu()">Voltar</button>
</div>

<div id="registros" class="tela card">
  <h3>Registros</h3>
  <input id="filtroNome" placeholder="Filtrar" oninput="listar()">
  <div>Saldo: <span id="saldoColaborador">0</span></div>
  <div id="listaRegistros"></div>
  <button onclick="voltarMenu()">Voltar</button>
</div>

<div id="relatorios" class="tela card">
  <h3>Relatórios</h3>
  <button onclick="exportarDetalhado()">Excel Detalhado</button>
  <button onclick="exportarSaldo()">Excel Saldo</button>
  <button onclick="voltarMenu()">Voltar</button>
</div>

</body>
</html>
