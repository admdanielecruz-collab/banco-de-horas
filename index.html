<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ponto de Deslocamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --verde:#239148; }

body{
  font-family:"Segoe UI",Arial;
  background:#eef2f5;
  margin:0;
}

header{
  background:var(--verde);
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.tela{
  display:none;
  padding:15px;
  max-width:500px;
  margin:auto;
}

.card{
  background:#fff;
  padding:15px;
  border-radius:12px;
  margin-bottom:15px;
  box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input,select,button{
  width:100%;
  padding:12px;
  margin-top:8px;
  border-radius:8px;
  border:1px solid #ccc;
}

button{
  background:var(--verde);
  color:#fff;
  border:none;
}

.excluir{ background:#c0392b; }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore, collection, addDoc, getDocs, deleteDoc, doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

/* FIREBASE CONFIG */
const firebaseConfig = {
  apiKey: "AIzaSyAMgb-lp7EVOSbCzi9z1V_R4-QJE7p5ZI8",
  authDomain: "banco-de-horas-aff08.firebaseapp.com",
  projectId: "banco-de-horas-aff08",
  storageBucket: "banco-de-horas-aff08.firebasestorage.app",
  messagingSenderId: "936782096721",
  appId: "1:936782096721:web:8b87287131f391502e4b70"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let usuarioLogado = null;
let projetos=["Aliança","Assu","AVT","Delta","Engie","Pampa"];

/* TELAS */
window.mostrar=(id)=>{
  document.querySelectorAll(".tela").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}
mostrar("login");

/* LOGIN */
window.entrar=async()=>{
  const snapshot = await getDocs(collection(db,"usuarios"));

  let user=null;

  snapshot.forEach(d=>{
    let u=d.data();
    if(u.usuario===loginUser.value && u.senha===loginPass.value){
      user=u;
    }
  });

  if(user){
    usuarioLogado=user;
    montarMenu();
    mostrar("menu");
  }else{
    alert("Login inválido");
  }
}

/* MENU */
window.montarMenu=()=>{
  menu.innerHTML="<h3>Menu</h3>";

  menu.innerHTML+=`<button onclick="mostrar('registro')">Registrar</button>`;
  menu.innerHTML+=`<button onclick="mostrar('registros'); listar();">Registros</button>`;
  menu.innerHTML+=`<button onclick="mostrar('relatorios')">Relatórios</button>`;

  if(usuarioLogado.perfil==="rh"){
    menu.innerHTML+=`<button onclick="mostrar('ajuste')">Ajustar Saldo</button>`;
    menu.innerHTML+=`<button onclick="mostrar('usuarios')">Usuários</button>`;
  }

  menu.innerHTML+=`<button onclick="location.reload()">Sair</button>`;
}

/* CARREGAR PROJETOS */
window.addEventListener("load",()=>{
  ["rProjeto","aProjeto"].forEach(id=>{
    let s=document.getElementById(id);
    if(!s) return;

    projetos.forEach(p=>{
      let o=document.createElement("option");
      o.text=p;
      s.add(o);
    });
  });
});

/* ✅ REGISTRAR */
async function salvarRegistro(){

  if(!rNome.value || !rData.value || !rEntrada.value || !rSaida.value){
    alert("Preencha todos os campos");
    return;
  }

  let h=(new Date("1970-1-1 "+rSaida.value) -
         new Date("1970-1-1 "+rEntrada.value))/3600000;

  if(h<0)h+=24;

  await addDoc(collection(db,"registros"),{
    nome:rNome.value,
    data:rData.value,
    entrada:rEntrada.value,
    saida:rSaida.value,
    horas:h,
    projeto:rProjeto.value,
    tipo:rTipo.value,
    motivo:rMotivo.value
  });

  alert("Salvo ✅");

  rNome.value="";
  rData.value="";
  rEntrada.value="";
  rSaida.value="";
  rMotivo.value="";
}

/* BOTÃO SALVAR */
window.addEventListener("load",()=>{
  let btn=document.getElementById("btnSalvar");
  if(btn){
    btn.addEventListener("click",salvarRegistro);
  }
});

/* LISTAR */
window.listar=async()=>{
  listaRegistros.innerHTML="";
  let filtro=filtroNome.value.toLowerCase();
  let saldo=0;

  const snapshot=await getDocs(collection(db,"registros"));

  snapshot.forEach(d=>{
    let r=d.data();

    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    if(r.tipo==="banco") saldo+=r.horas;
    if(r.tipo==="compensar") saldo-=r.horas;

    listaRegistros.innerHTML+=`
    <div class="item">
      <b>${r.nome}</b><br>
      ${r.data} ${r.entrada}-${r.saida} (${r.horas.toFixed(2)}h)<br>
      ${r.projeto}<br>
      <small>${r.motivo}</small>
      <button class="excluir" onclick="excluirRegistro('${d.id}')">Excluir</button>
    </div>`;
  });

  saldoColaborador.innerText=saldo.toFixed(2);
}

/* EXCLUIR */
window.excluirRegistro=async(id)=>{
  if(confirm("Excluir?")){
    await deleteDoc(doc(db,"registros",id));
    listar();
  }
}

/* AJUSTE */
window.ajustarSaldo=async()=>{
  let horas=parseFloat(aHoras.value);

  if(!aNome.value || isNaN(horas)){
    alert("Preencha corretamente");
    return;
  }

  let tipo= horas>=0 ? "banco" : "compensar";

  await addDoc(collection(db,"registros"),{
    nome:aNome.value,
    data:new Date().toISOString().split("T")[0],
    entrada:"00:00",
    saida:"00:00",
    horas:Math.abs(horas),
    projeto:aProjeto.value,
    tipo:tipo,
    motivo:"Ajuste manual"
  });

  alert("Ajuste aplicado ✅");
}

/* USUÁRIOS */
window.cadastrarUsuario=async()=>{
  if(!uNome.value || !uSenha.value){
    alert("Preencha");
    return;
  }

  await addDoc(collection(db,"usuarios"),{
    usuario:uNome.value,
    senha:uSenha.value,
    perfil:uPerfil.value
  });

  alert("Usuário cadastrado ✅");
}

/* RELATÓRIOS */
window.exportarDetalhado=async()=>{
  let filtro=prompt("Filtrar colaborador")?.toLowerCase();

  const snapshot=await getDocs(collection(db,"registros"));

  let csv="Colaborador;Data;Entrada;Saida;Horas;Projeto;Tipo;Motivo\n";

  snapshot.forEach(d=>{
    let r=d.data();
    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    csv+=`${r.nome};${r.data};${r.entrada};${r.saida};${r.horas.toFixed(2)};${r.projeto};${r.tipo};${r.motivo}\n`;
  });

  downloadCSV(csv,"detalhado.csv");
}

window.exportarSaldo=async()=>{
  let filtro=prompt("Filtrar colaborador")?.toLowerCase();

  const snapshot=await getDocs(collection(db,"registros"));

  let saldo={};

  snapshot.forEach(d=>{
    let r=d.data();

    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    if(!saldo[r.nome]) saldo[r.nome]=0;

    if(r.tipo==="banco") saldo[r.nome]+=r.horas;
    if(r.tipo==="compensar") saldo[r.nome]-=r.horas;
  });

  let csv="Colaborador;Saldo\n";

  for(let n in saldo){
    csv+=`${n};${saldo[n].toFixed(2)}\n`;
  }

  downloadCSV(csv,"saldo.csv");
}

/* DOWNLOAD */
function downloadCSV(csv,nome){
  let blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
  let link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=nome;
  link.click();
}

window.voltarMenu=()=>mostrar("menu");

</script>
</head>

<body>

<header>Ponto de Deslocamento</header>

<div id="login" class="tela card">
<h3>Login</h3>
<input id="loginUser" placeholder="Usuário">
<input id="loginPass" type="password">
<button onclick="entrar()">Entrar</button>
</div>

<div id="menu" class="tela card"></div>

<div id="registro" class="tela card">
<h3>Registrar</h3>
<input id="rNome" placeholder="Colaborador">
<input type="date" id="rData">
<input type="time" id="rEntrada">
<input type="time" id="rSaida">
<input id="rMotivo" placeholder="Motivo">
<select id="rProjeto"></select>
<select id="rTipo">
<option value="banco">Banco</option>
<option value="compensar">Compensar</option>
</select>
<button id="btnSalvar">Salvar</button>
<button onclick="voltarMenu()">Voltar</button>
</div>

<div id="registros" class="tela card">
<h3>Registros</h3>
<input id="filtroNome" oninput="listar()">
<div>Saldo: <span id="saldoColaborador">0</span></div>
<div id="listaRegistros"></div>
<button onclick="voltarMenu()">Voltar</button>
</div>

<div id="relatorios" class="tela card">
<h3>Relatórios</h3>
<button onclick="exportarDetalhado()">Excel Detalhado</button>
<button onclick="exportarSaldo()">Excel Saldo</button>
<button onclick="voltarMenu()">Voltar</button>
</div>

<div id="ajuste" class="tela card">
<h3>Ajuste</h3>
<input id="aNome">
<select id="aProjeto"></select>
<input type="number" id="aHoras">
<button onclick="ajustarSaldo()">Aplicar</button>
<button onclick="voltarMenu()">Voltar</button>
</div>

<div id="usuarios" class="tela card">
<h3>Usuários</h3>
<input id="uNome">
<input id="uSenha">
<select id="uPerfil">
<option value="gestor">Gestor</option>
<option value="rh">RH</option>
</select>
<button onclick="cadastrarUsuario()">Cadastrar</button>
<button onclick="voltarMenu()">Voltar</button>
</div>

</body>
</html>
