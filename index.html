<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Banco de Horas - Sistema</title>
    <style>
        body{font-family:Arial;background:#eef2f5;margin:0}
        header{background:#239148;color:#fff;padding:15px;text-align:center}
        .tela{display:none;padding:15px;max-width:800px;margin:auto}
        .card{background:#fff;padding:15px;border-radius:10px;margin-top:15px}
        input,select,button{width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc}
        button{background:#239148;color:#fff;border:none;cursor:pointer}
        table{width:100%;border-collapse:collapse;margin-top:10px}
        th,td{border:1px solid #ddd;padding:8px;text-align:left}
        .excluir{background:red;width:auto;padding:5px}
    </style>
</head>
<body>

<header>Banco de Horas</header>
<div id="msg" style="text-align:center; padding:10px"></div>

<!-- Telas -->
<div id="login" class="tela" style="display:block">
    <div class="card">
        <input id="loginUser" placeholder="Usuário">
        <input id="loginPass" type="password" placeholder="Senha">
        <button id="btnEntrar">Entrar</button>
    </div>
</div>

<div id="menu" class="tela"></div>

<div id="registros" class="tela card">
    <h3>Registros</h3>
    <input id="filtroNome" placeholder="Filtrar por nome...">
    <div id="tabelaContainer"></div>
    <button id="btnVoltarMenu">Voltar</button>
</div>

<!-- Scripts -->
<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const app = initializeApp({ /* SUAS CONFIGS AQUI */ });
    const db = getFirestore(app);

    // Estado Global
    let currentUser = null;

    // Vinculação de eventos
    document.getElementById('btnEntrar').addEventListener('click', () => fazerLogin());
    document.getElementById('btnVoltarMenu').addEventListener('click', () => mostrar('menu'));

    async function fazerLogin() {
        // Lógica simplificada de autenticação (Considere usar Firebase Auth para real segurança)
        const user = document.getElementById('loginUser').value;
        const snapshot = await getDocs(query(collection(db, "usuarios"), where("usuario", "==", user)));
        
        if (!snapshot.empty) {
            currentUser = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
            montarMenu();
            mostrar('menu');
        } else {
            alert("Usuário não encontrado");
        }
    }

    function montarMenu() {
        const menu = document.getElementById('menu');
        menu.innerHTML = `
            <div class="card">
                <h3>Bem-vindo, ${currentUser.usuario}</h3>
                <button id="navRegistros">Registros</button>
                <button id="navRelatorios">Relatórios</button>
                <button onclick="location.reload()">Sair</button>
            </div>
        `;
        document.getElementById('navRegistros').addEventListener('click', carregarRegistros);
    }

    async function carregarRegistros() {
        mostrar('registros');
        const container = document.getElementById('tabelaContainer');
        
        // Filtro por projeto (Acesso apenas ao projeto do perfil do usuário)
        const q = query(collection(db, "registros"), where("projeto", "in", currentUser.projetos));
        
        onSnapshot(q, (snap) => {
            let html = `<table><tr><th>Nome</th><th>Data</th><th>Horas</th><th>Ações</th></tr>`;
            snap.forEach(doc => {
                const r = doc.data();
                html += `<tr><td>${r.nome}</td><td>${r.data}</td><td>${r.horas}</td>
                         <td><button class="excluir" onclick="excluirRegistro('${doc.id}')">X</button></td></tr>`;
            });
            html += `</table>`;
            container.innerHTML = html;
        });
    }

    // Exportar para o escopo global para o onclick do HTML funcionar
    window.excluirRegistro = async (id) => {
        if(confirm("Excluir?")) await deleteDoc(doc(db, "registros", id));
    };

    function mostrar(id) {
        document.querySelectorAll(".tela").forEach(t => t.style.display = "none");
        document.getElementById(id).style.display = "block";
    }
</script>

</body>
</html>
