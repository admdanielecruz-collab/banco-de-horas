<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Ponto de Deslocamento</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root { --verde:#239148; }

body{
  font-family:"Segoe UI",Arial;
  background:#eef2f5;
  margin:0;
}

header{
  background:var(--verde);
  color:#fff;
  padding:15px;
  text-align:center;
  font-weight:bold;
}

.tela{display:none;padding:15px;max-width:500px;margin:auto;}
.card{
  background:#fff;padding:15px;border-radius:12px;
  margin-bottom:15px;box-shadow:0 4px 10px rgba(0,0,0,.1);
}

input,select,button{
  width:100%;padding:10px;margin-top:8px;border-radius:8px;border:1px solid #ccc;
}

button{background:var(--verde);color:#fff;border:none;}
.menu button{margin-bottom:10px;}
.excluir{background:#c0392b;}

.item{
  background:#f7f7f7;padding:10px;margin-top:10px;border-radius:8px;
}
</style>

<script>
let db, usuarioLogado=null;
let projetos=["Aliança","Assu","AVT","Delta","Engie","Pampa"];

document.addEventListener("DOMContentLoaded", async ()=>{

  const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js");
  const { getFirestore, collection, addDoc, getDocs, deleteDoc, doc } =
        await import("https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js");

  window.fb = { collection, addDoc, getDocs, deleteDoc, doc };

  const firebaseConfig = {
    apiKey: "AIzaSyAMgb-lp7EVOSbCzi9z1V_R4-QJE7p5ZI8",
    authDomain: "banco-de-horas-aff08.firebaseapp.com",
    projectId: "banco-de-horas-aff08",
    storageBucket: "banco-de-horas-aff08.firebasestorage.app",
    messagingSenderId: "936782096721",
    appId: "1:936782096721:web:8b87287131f391502e4b70"
  };

  const app = initializeApp(firebaseConfig);
  db = getFirestore(app);

  mostrar("login");

  ["rProjeto","aProjeto"].forEach(id=>{
    let s=document.getElementById(id);
    if(s){
      projetos.forEach(p=>{
        let o=document.createElement("option");
        o.text=p;
        s.add(o);
      });
    }
  });

  btnEntrar.onclick = entrar;
  btnSalvar.onclick = registrar;
});

/* TELAS */
function mostrar(id){
  document.querySelectorAll(".tela").forEach(t=>t.style.display="none");
  document.getElementById(id).style.display="block";
}

/* LOGIN */
async function entrar(){

  let user = loginUser.value.trim().toLowerCase();
  let pass = loginPass.value.trim();

  if(user==="rh" && pass==="cymirh2026"){
    usuarioLogado={perfil:"rh"};
    montarMenu();
    mostrar("menu");
    return;
  }

  const { collection, getDocs } = window.fb;

  let snapshot = await getDocs(collection(db,"usuarios"));
  let achou=null;

  snapshot.forEach(doc=>{
    let u=doc.data();
    if(u.usuario===user && u.senha===pass){
      achou=u;
    }
  });

  if(!achou){
    alert("Login inválido");
    return;
  }

  usuarioLogado=achou;
  montarMenu();
  mostrar("menu");
}

/* MENU */
function montarMenu(){
  menu.innerHTML="<h3>Menu</h3>";

  menu.innerHTML+=`<button onclick="mostrar('registro')">Registrar</button>`;
  menu.innerHTML+=`<button onclick="mostrar('registros'); listar()">Registros</button>`;
  menu.innerHTML+=`<button onclick="mostrar('relatorios')">Relatórios</button>`;

  if(usuarioLogado.perfil==="rh"){
    menu.innerHTML+=`<button onclick="mostrar('ajuste')">Ajustar Saldo</button>`;
    menu.innerHTML+=`<button onclick="mostrar('usuarios')">Usuários</button>`;
  }

  menu.innerHTML+=`<button onclick="location.reload()">Sair</button>`;
}

/* REGISTRAR */
async function registrar(){
  const { addDoc, collection } = window.fb;

  if(!rNome.value || !rData.value || !rEntrada.value || !rSaida.value){
    alert("Preencha todos os campos");
    return;
  }

  let h=(new Date("1970-1-1 "+rSaida.value) -
         new Date("1970-1-1 "+rEntrada.value))/3600000;
  if(h<0)h+=24;

  await addDoc(collection(db,"registros"),{
    nome:rNome.value,
    data:rData.value,
    entrada:rEntrada.value,
    saida:rSaida.value,
    horas:h,
    projeto:rProjeto.value,
    tipo:rTipo.value,
    motivo:rMotivo.value
  });

  alert("Registro salvo ✅");

  rNome.value="";
  rData.value="";
  rEntrada.value="";
  rSaida.value="";
  rMotivo.value="";
}

/* LISTAR */
async function listar(){
  const { getDocs, collection } = window.fb;

  listaRegistros.innerHTML="";
  let filtro=filtroNome.value.toLowerCase();
  let saldo=0;

  let snapshot=await getDocs(collection(db,"registros"));

  snapshot.forEach(doc=>{
    let r=doc.data();

    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    if(r.tipo==="banco") saldo+=r.horas;
    if(r.tipo==="compensar") saldo-=r.horas;

    listaRegistros.innerHTML+=`
    <div class="item">
      <b>${r.nome}</b><br>
      ${r.data} ${r.entrada}-${r.saida} (${r.horas.toFixed(2)}h)<br>
      ${r.projeto}<br>
      <small>${r.motivo}</small>
      <button class="excluir" onclick="excluirRegistro('${doc.id}')">Excluir</button>
    </div>`;
  });

  saldoColaborador.innerText=saldo.toFixed(2);
}

/* EXCLUIR */
async function excluirRegistro(id){
  const { deleteDoc, doc } = window.fb;

  if(confirm("Excluir registro?")){
    await deleteDoc(doc(db,"registros",id));
    listar();
  }
}

/* AJUSTE */
async function ajustarSaldo(){
  const { addDoc, collection } = window.fb;

  let horas=parseFloat(aHoras.value);
  let tipo=horas>=0?"banco":"compensar";

  await addDoc(collection(db,"registros"),{
    nome:aNome.value,
    data:new Date().toISOString().split("T")[0],
    entrada:"00:00",
    saida:"00:00",
    horas:Math.abs(horas),
    projeto:aProjeto.value,
    tipo:tipo,
    motivo:"Ajuste manual"
  });

  alert("Ajuste aplicado ✅");
}

/* USUÁRIOS */
async function cadastrarUsuario(){
  const { addDoc, collection } = window.fb;

  await addDoc(collection(db,"usuarios"),{
    usuario:uNome.value,
    senha:uSenha.value,
    perfil:uPerfil.value
  });

  alert("Usuário cadastrado ✅");
}

/* RELATÓRIOS */
async function exportarDetalhado(){
  const { getDocs, collection } = window.fb;

  let filtro=prompt("Filtrar colaborador")?.toLowerCase();

  let csv="Colaborador;Data;Entrada;Saida;Horas;Projeto;Tipo;Motivo\n";
  let snapshot=await getDocs(collection(db,"registros"));

  snapshot.forEach(d=>{
    let r=d.data();
    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    csv+=`${r.nome};${r.data};${r.entrada};${r.saida};${r.horas.toFixed(2)};${r.projeto};${r.tipo};${r.motivo}\n`;
  });

  downloadCSV(csv,"detalhado.csv");
}

async function exportarSaldo(){
  const { getDocs, collection } = window.fb;

  let filtro=prompt("Filtrar colaborador")?.toLowerCase();

  let snapshot=await getDocs(collection(db,"registros"));
  let saldo={};

  snapshot.forEach(d=>{
    let r=d.data();
    if(filtro && !r.nome.toLowerCase().includes(filtro)) return;

    if(!saldo[r.nome]) saldo[r.nome]=0;

    if(r.tipo==="banco") saldo[r.nome]+=r.horas;
    if(r.tipo==="compensar") saldo[r.nome]-=r.horas;
  });

  let csv="Colaborador;Saldo\n";

  for(let n in saldo){
    csv+=`${n};${saldo[n].toFixed(2)}\n`;
  }

  downloadCSV(csv,"saldo.csv");
}

/* DOWNLOAD */
function downloadCSV(csv,nome){
  let blob=new Blob(["\ufeff"+csv],{type:"text/csv"});
  let link=document.createElement("a");
  link.href=URL.createObjectURL(blob);
  link.download=nome;
  link.click();
}
</script>
</head>

<body>

<header>Ponto de Deslocamento</header>

<div id="login" class="tela card">
<h3>Login</h3>
<input id="loginUser">
<input id="loginPass" type="password">
<button id="btnEntrar">Entrar</button>
</div>

<div id="menu" class="tela card menu"></div>

<div id="registro" class="tela card">
<h3>Registrar</h3>
<input id="rNome">
<input type="date" id="rData">
<input type="time" id="rEntrada">
<input type="time" id="rSaida">
<input id="rMotivo">
<select id="rProjeto"></select>
<select id="rTipo">
<option value="banco">Banco</option>
<option value="compensar">Compensar</option>
</select>
<button id="btnSalvar">Salvar</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="registros" class="tela card">
<input id="filtroNome" oninput="listar()">
<div>Saldo: <span id="saldoColaborador">0</span></div>
<div id="listaRegistros"></div>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="relatorios" class="tela card">
<button onclick="exportarDetalhado()">Excel Detalhado</button>
<button onclick="exportarSaldo()">Excel Saldo</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="ajuste" class="tela card">
<input id="aNome">
<select id="aProjeto"></select>
<input type="number" id="aHoras">
<button onclick="ajustarSaldo()">Aplicar</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

<div id="usuarios" class="tela card">
<input id="uNome">
<input id="uSenha">
<select id="uPerfil">
<option value="gestor">Gestor</option>
<option value="rh">RH</option>
</select>
<button onclick="cadastrarUsuario()">Cadastrar</button>
<button onclick="mostrar('menu')">Voltar</button>
</div>

</body>
</html>
